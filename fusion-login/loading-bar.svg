<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 180 60" role="img" aria-label="Three animated stars">
  <!-- Fondo transparente; contenedor imaginario centrado -->
  <g transform="translate(90 30) scale(2)">
    <!-- Estrella 1 -->
    <g transform="translate(-28 0)">
      <path fill="#fff" d="M0,-6.5 L1.6,-2.0 L6.2,-2.0 L2.4,0.6 L3.9,5.1 L0,2.2 L-3.9,5.1 L-2.4,0.6 L-6.2,-2.0 L-1.6,-2.0 Z">
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 0 -6; 0 0" dur="0.9s" repeatCount="indefinite" />
      </path>
    </g>

    <!-- Estrella 2 -->
    <g transform="translate(0 0)">
      <path fill="#fff" d="M0,-6.5 L1.6,-2.0 L6.2,-2.0 L2.4,0.6 L3.9,5.1 L0,2.2 L-3.9,5.1 L-2.4,0.6 L-6.2,-2.0 L-1.6,-2.0 Z">
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 0 -6; 0 0" dur="0.9s" begin="0.15s" repeatCount="indefinite" />
      </path>
    </g>

    <!-- Estrella 3 -->
    <g transform="translate(28 0)">
      <path fill="#fff" d="M0,-6.5 L1.6,-2.0 L6.2,-2.0 L2.4,0.6 L3.9,5.1 L0,2.2 L-3.9,5.1 L-2.4,0.6 L-6.2,-2.0 L-1.6,-2.0 Z">
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 0 -6; 0 0" dur="0.9s" begin="0.3s" repeatCount="indefinite" />
      </path>
    </g>
  </g>
</svg> 