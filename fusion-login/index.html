<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal de aplicaciones remotas | Inicio de sesión</title>
  <meta name="description" content="Pantalla de inicio de sesión del Portal de aplicaciones remotas">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cinzel:wght@500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script defer src="script.js"></script>
</head>

<body>
  <div id="preloader" class="preloader" aria-hidden="true">
    <div class="preloader-box">
      <img src="loading-bar.svg" alt="Cargando" class="preloader-logo">
      <p class="preloader-text">Cargando sistema...</p>
    </div>
  </div>

  <div class="bg-glow bg-glow--one"></div>
  <div class="bg-glow bg-glow--two"></div>
  <div class="bg-grid" aria-hidden="true"></div>

  <main class="page">
    <section class="login-shell" aria-label="Acceso al sistema">
      <section class="login-card" aria-label="Portal de aplicaciones remotas">
        <div class="panel panel--left">
          <div class="panel__inner panel__inner--form">
            <header class="hero-title">
              <h1>Portal de aplicaciones remotas</h1>
              <p>Acceso remoto a las aplicaciones institucionales virtualizadas.</p>
            </header>

            <div class="form-head">
              <h2>Inicio de sesión</h2>
            </div>

            <form class="login-form" id="loginForm" data-redirect="apps/apps.html" novalidate>
              <label class="field">
                <span class="field__label">Usuario</span>
                <input type="text" name="username" id="username" placeholder="Usuario institucional"
                  autocomplete="username">
              </label>

              <label class="field field--password">
                <span class="field__label">Contraseña</span>
                <input type="password" name="password" id="password" placeholder="Ingrese su contraseña"
                  autocomplete="current-password">
                <button class="toggle-password" type="button" id="togglePassword" aria-label="Mostrar contraseña"
                  aria-pressed="false">
                  <svg class="icon-eye" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" />
                    <circle cx="12" cy="12" r="3.2" />
                    <path class="eye-slash" d="M4 4l16 16" />
                  </svg>
                </button>
              </label>

              <button class="btn-submit" type="submit">
                <span>Ingresar</span>
              </button>

              <p class="form-message" id="formMessage" role="status" aria-live="polite"></p>
            </form>
          </div>
        </div>

        <div class="panel panel--right">
          <div class="panel__inner panel__inner--info">
            <div class="brand-block">
              <div class="gov-brand">
                <img src="logo_sv_animado.svg" alt="Gobierno de El Salvador" class="gov-brand__seal">
              </div>
            </div>

            <div class="notice">
              <h2>Bienvenido</h2>
              <p>Inicia sesión con las credenciales de tu usuario institucional.</p>
            </div>

            <footer class="support">
              <strong>DINAFI-USC</strong>
            </footer>
          </div>
        </div>
      </section>

      <!-- <div class="demo-badge" aria-label="Estado del entorno">
        <span>Vista de demostración</span>
      </div> -->
    </section>
  </main>
</body>

</html>
