<div class="preloader" [class.hidden]="!showPreloader()" aria-hidden="true">
  <div class="preloader-box">
    <img src="loading-bar.svg" alt="Cargando" class="preloader-logo">
    <p class="preloader-text">Cargando sistema...</p>
  </div>
</div>

<div class="bg-glow bg-glow--one"></div>
<div class="bg-glow bg-glow--two"></div>
<div class="bg-grid" aria-hidden="true"></div>

<main class="page">
  <section class="login-shell" aria-label="Acceso al sistema">
    <section class="login-card" aria-label="Portal de aplicaciones remotas">
      <div class="panel panel--left">
        <div class="panel__inner panel__inner--form">
          <header class="hero-title">
            <h1>Portal de aplicaciones remotas</h1>
            <p>Acceso remoto a las aplicaciones institucionales virtualizadas.</p>
          </header>

          <div class="form-head">
            <h2>Inicio de sesión</h2>
          </div>

          <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
            <label class="field">
              <span class="field__label">Usuario</span>
              <input type="text" formControlName="username"
                     placeholder="Usuario institucional" autocomplete="username">
            </label>

            <label class="field field--password">
              <span class="field__label">Contraseña</span>
              <input [type]="passwordVisible() ? 'text' : 'password'"
                     formControlName="password"
                     placeholder="Ingrese su contraseña"
                     autocomplete="off">
              <button class="toggle-password" type="button"
                      (click)="togglePassword()"
                      [attr.aria-label]="passwordVisible() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
                      [attr.aria-pressed]="passwordVisible()"
                      [class.is-visible]="passwordVisible()">
                <svg class="icon-eye" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" />
                  <circle cx="12" cy="12" r="3.2" />
                  <path class="eye-slash" d="M4 4l16 16" />
                </svg>
              </button>
            </label>

            <button class="btn-submit" type="submit" [disabled]="loading()">
              <span>Ingresar</span>
            </button>

            @if (errorMessage()) {
              <p class="form-message" role="alert" aria-live="polite">{{ errorMessage() }}</p>
            }
          </form>
        </div>
      </div>

      <div class="panel panel--right">
        <div class="panel__inner panel__inner--info">
          <div class="brand-block">
            <div class="gov-brand">
              <img src="logo_sv_animado.svg" alt="Gobierno de El Salvador" class="gov-brand__seal">
            </div>
          </div>

          <div class="notice">
            <h2>Bienvenido</h2>
            <p>Inicia sesión con las credenciales de tu usuario institucional.</p>
          </div>

          <footer class="support">
            <strong>DINAFI-USC</strong>
          </footer>
        </div>
      </div>
    </section>
  </section>
</main>
