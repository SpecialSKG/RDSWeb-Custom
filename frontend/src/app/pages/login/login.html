<div>
  <h1>Escritorio Remoto</h1>

  @if (errorMessage()) {
    <p>{{ errorMessage() }}</p>
  }

  <form (ngSubmit)="onSubmit()" #f="ngForm" novalidate>
    <div>
      <label for="username">Usuario</label>
      <input id="username" [(ngModel)]="username" name="username" required [disabled]="loading()" />
    </div>

    <div>
      <label for="password">Contraseña</label>
      <input
        id="password"
        [type]="showPassword() ? 'text' : 'password'"
        [(ngModel)]="password"
        name="password"
        required
        [disabled]="loading()"
      />
      <button type="button" (click)="showPassword.set(!showPassword())">
        {{ showPassword() ? 'Ocultar' : 'Mostrar' }}
      </button>
    </div>

    <fieldset>
      <legend>Tipo de sesión</legend>
      <label>
        <input
          type="radio"
          name="sessionMode"
          [checked]="!isPublic()"
          (change)="isPublic.set(false)"
        />
        Privado
      </label>
      <label>
        <input
          type="radio"
          name="sessionMode"
          [checked]="isPublic()"
          (change)="isPublic.set(true)"
        />
        Público
      </label>
    </fieldset>

    <button type="submit" [disabled]="loading() || !username() || !password()">
      @if (loading()) {
        Cargando...
      } @else {
        Iniciar sesión
      }
    </button>
  </form>
</div>
