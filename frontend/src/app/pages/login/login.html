<section class="login-container">
    <div class="login-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="login-card fade-in-up">
        <!-- Logo / Marca -->
        <div class="login-header">
            <div class="logo-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                    <rect x="2" y="3" width="20" height="14" rx="2" stroke="#6c63ff" stroke-width="2" />
                    <path d="M8 21h8M12 17v4" stroke="#6c63ff" stroke-width="2" stroke-linecap="round" />
                </svg>
            </div>
            <h1 class="login-title">Escritorio Remoto</h1>
            <p class="login-subtitle">Accede a tus aplicaciones de trabajo de forma segura</p>
        </div>

        <!-- Error global -->
        <div class="error-banner" *ngIf="errorMessage">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" stroke="#ff5252" stroke-width="2" />
                <path d="M12 8v4M12 16h.01" stroke="#ff5252" stroke-width="2" stroke-linecap="round" />
            </svg>
            {{ errorMessage }}
        </div>

        <!-- Formulario -->
        <form class="login-form" (ngSubmit)="onSubmit()" #f="ngForm" novalidate>
            <mat-form-field appearance="fill" class="full-width">
                <mat-label>Usuario (DOMINIO\usuario)</mat-label>
                <input matInput [(ngModel)]="username" name="username" required autocomplete="username"
                    [disabled]="loading" />
                <mat-icon matSuffix>person</mat-icon>
            </mat-form-field>

            <mat-form-field appearance="fill" class="full-width">
                <mat-label>Contraseña</mat-label>
                <input matInput [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password"
                    required autocomplete="current-password" [disabled]="loading" />
                <button matIconSuffix type="button" mat-icon-button (click)="showPassword = !showPassword">
                    <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
                </button>
            </mat-form-field>

            <!-- Modo público/privado -->
            <div class="session-mode">
                <p class="mode-label">Tipo de sesión</p>
                <div class="mode-options">
                    <label class="mode-option" [class.selected]="!isPublic" (click)="isPublic = false">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke="currentColor"
                                stroke-width="2" />
                        </svg>
                        Privado
                    </label>
                    <label class="mode-option" [class.selected]="isPublic" (click)="isPublic = true">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <rect x="2" y="2" width="20" height="20" rx="2" stroke="currentColor" stroke-width="2" />
                            <path d="M8 10h8M8 14h5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                        Público
                    </label>
                </div>
            </div>

            <button mat-flat-button class="login-btn" type="submit" [disabled]="loading || !username || !password">
                <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
                <span *ngIf="!loading">Iniciar sesión</span>
            </button>
        </form>

        <p class="login-footer">LAB-MH — Acceso Web de Escritorio Remoto</p>
    </div>
</section>
