<div>
    <h1>Escritorio Remoto</h1>

    @if (errorMessage) {
        <p>{{ errorMessage }}</p>
    }

    <form (ngSubmit)="onSubmit()" #f="ngForm" novalidate>
        <div>
            <label for="username">Usuario (DOMINIO\usuario)</label>
            <input id="username" [(ngModel)]="username" name="username" required autocomplete="username"
                [disabled]="loading" />
        </div>

        <div>
            <label for="password">Contraseña</label>
            <input id="password" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password"
                required autocomplete="current-password" [disabled]="loading" />
            <button type="button" (click)="showPassword = !showPassword">
                {{ showPassword ? 'Ocultar' : 'Mostrar' }}
            </button>
        </div>

        <fieldset>
            <legend>Tipo de sesión</legend>
            <label>
                <input type="radio" name="sessionMode" [checked]="!isPublic" (change)="isPublic = false" />
                Privado
            </label>
            <label>
                <input type="radio" name="sessionMode" [checked]="isPublic" (change)="isPublic = true" />
                Público
            </label>
        </fieldset>

        <button type="submit" [disabled]="loading || !username || !password">
            @if (loading) {
                Cargando...
            } @else {
                Iniciar sesión
            }
        </button>
    </form>
</div>
