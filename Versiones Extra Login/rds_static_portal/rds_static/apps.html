<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal RDS - Aplicaciones</title>
  <link rel="stylesheet" href="portal.css">
</head>
<body data-page="apps">
  <div class="background"></div>

  <main class="page-shell">
    <header class="dashboard-header card card--header">
      <div class="brand-block">
        <div class="brand-seal brand-seal--small" aria-hidden="true">
          <svg viewBox="0 0 64 64" role="img">
            <circle cx="32" cy="32" r="30" fill="currentColor" opacity="0.12"></circle>
            <circle cx="32" cy="32" r="22" fill="none" stroke="currentColor" stroke-width="2"></circle>
            <path d="M32 16l3.4 8.2 8.8.7-6.7 5.8 2.1 8.6L32 34.7l-7.6 4.6 2.1-8.6-6.7-5.8 8.8-.7L32 16z" fill="currentColor"></path>
          </svg>
        </div>
        <div class="brand-copy">
          <p class="eyebrow">DINAFI - USC</p>
          <h1>RDS Web Apps MH</h1>
          <p class="muted">Haz clic en una aplicación para abrir su enlace configurado.</p>
        </div>
      </div>

      <div class="header-actions">
        <label class="avatar" for="avatar-input" title="Cambiar avatar">
          <span id="avatar-fallback">U</span>
          <img id="avatar-image" alt="Avatar de usuario" hidden>
        </label>
        <input id="avatar-input" type="file" accept="image/*" hidden>

        <div class="user-box">
          <strong id="display-name">Usuario</strong>
          <span class="muted">Conectado</span>
        </div>

        <button class="icon-btn" id="theme-toggle" type="button" aria-label="Cambiar tema">🌙</button>
        <button class="icon-btn icon-btn--danger" id="logout-btn" type="button" aria-label="Cerrar sesión">⎋</button>
      </div>
    </header>

    <section class="toolbar card">
      <div class="field field--grow">
        <label for="search-apps">Buscar aplicación</label>
        <input id="search-apps" type="search" placeholder="Buscar por nombre, categoría o proveedor">
      </div>

      <div class="field">
        <label for="filter-category">Categoría</label>
        <select id="filter-category">
          <option value="all">Todas</option>
        </select>
      </div>
    </section>

    <section id="apps-groups" class="groups"></section>
  </main>

  <template id="group-template">
    <section class="group card">
      <div class="group-header">
        <div>
          <h2 class="group-title"></h2>
          <p class="group-subtitle muted"></p>
        </div>
        <span class="group-count"></span>
      </div>
      <div class="apps-grid"></div>
    </section>
  </template>

  <template id="app-card-template">
    <article class="app-card">
      <div class="app-icon"></div>
      <div class="app-copy">
        <h3 class="app-name"></h3>
        <p class="app-publisher muted"></p>
      </div>
      <a class="app-link" target="_blank" rel="noopener noreferrer">Abrir</a>
    </article>
  </template>

  <script src="portal.js"></script>
</body>
</html>
